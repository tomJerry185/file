name: Rule Review Check

on:
  schedule:
    - cron: '0 9 1 * *'  # 每月1日 9:00 检查
  workflow_dispatch:

jobs:
  check-review-dates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check rule review dates
        run: |
          EXPIRED_RULES=""
          today_epoch=$(python3 -c "import datetime,time; print(int(datetime.datetime.now().timestamp()))")
          for file in rule/*.md; do
            if [ ! -f "$file" ]; then continue; fi
            review_date=$(grep "下次复审" "$file" 2>/dev/null | grep -oP '\d{4}-\d{2}-\d{2}' || echo "")
            if [ -n "$review_date" ]; then
              review_epoch=$(python3 -c "import datetime; print(int(datetime.datetime.strptime('$review_date','%Y-%m-%d').timestamp()))" 2>/dev/null || echo "0")
              if [ "$review_epoch" -lt "$today_epoch" ]; then
                EXPIRED_RULES="${EXPIRED_RULES}\n- ${file} (复审日期: ${review_date})"
              fi
            fi
          done

          if [ -n "$EXPIRED_RULES" ]; then
            echo -e "以下规范文件已过复审日期：${EXPIRED_RULES}"
            echo "EXPIRED=true" >> "$GITHUB_ENV"
            echo "EXPIRED_RULES<<EOF" >> "$GITHUB_ENV"
            echo -e "$EXPIRED_RULES" >> "$GITHUB_ENV"
            echo "EOF" >> "$GITHUB_ENV"
          else
            echo "所有规范文件均在复审有效期内。"
            echo "EXPIRED=false" >> "$GITHUB_ENV"
          fi

      - name: Create review issue if expired
        if: env.EXPIRED == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const expiredRules = process.env.EXPIRED_RULES;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `规范复审提醒 — ${new Date().toISOString().split('T')[0]}`,
              body: `以下规范文件的"下次复审"日期已过期，请安排复审：\n${expiredRules}\n\n---\n\n复核清单：\n- [ ] 检查规则是否仍然适用\n- [ ] 更新版本号和复审日期\n- [ ] 记录变更到变更历史\n- [ ] 如有结构性变更，更新 README.md`,
              labels: ['rule-review', 'documentation']
            });
